name: cloudguardian_ai
description: AI-powered Cloud Operations Assistant — CloudGuardian AI home page.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Google Fonts (Inter + Fira Code used in the app)
  google_fonts: ^6.2.1

  # Entrance / micro animations
  flutter_animate: ^4.5.0

  # Open URLs (GitHub CTA button)
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
